# =============================================================================
# Lawer — Docker Compose (dev-окружение)
# =============================================================================
# Поднимает инфраструктуру (PostgreSQL + pgvector, Redis, MinIO), backend
# (Fastify + Prisma) и frontend (Next.js standalone).
#
# Использование:
#   cp .env.example .env          # сначала настроить переменные
#   docker compose up -d          # поднять инфраструктуру
#   docker compose --profile init up minio-init   # создать бакет MinIO
#   docker compose --profile init up ollama-init  # скачать LLM-модель
#   docker compose ps             # проверить статус и healthcheck'и
#   docker compose down           # остановить (данные в volumes сохраняются)
#   docker compose down -v        # остановить и УДАЛИТЬ данные
#
# Современный Compose-спецификатор не требует поля `version:` — оно deprecated.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 с расширением pgvector.
  # Используется как основная СУБД (Prisma) и как векторная база для RAG.
  # Образ pgvector/pgvector:pg16 — официальный образ проекта pgvector,
  # собран поверх postgres:16 с уже установленным C-расширением vector.
  # Это избавляет от необходимости собирать собственный Dockerfile.
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lawer-postgres
    restart: unless-stopped
    # Переменные читаются из .env, имена согласованы с .env.example.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Единая таймзона для всех сервисов — см. .env.example, секция "Общие".
      TZ: ${TZ}
      # Форсируем UTF-8 и русскую коллацию при initdb — важно для сортировки
      # юридических текстов на русском языке.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    # Порт доступен из локальной сети (0.0.0.0) для dev-тестирования.
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # Именованный volume для персистентности данных между перезапусками.
      - postgres-data:/var/lib/postgresql/data
      # init.sql выполняется ТОЛЬКО при первичной инициализации кластера
      # (когда /var/lib/postgresql/data пуст). Активирует pgvector.
      # Префикс 01- гарантирует порядок выполнения, если скриптов станет больше.
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # Healthcheck через pg_isready — лёгкая проверка готовности принимать
    # соединения. Используется backend'ом через depends_on: condition.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lawer-net

  # ---------------------------------------------------------------------------
  # Redis 7 — используется BullMQ для очередей фоновой обработки документов
  # (парсинг PDF/DOCX, построение эмбеддингов) и как general-purpose кэш.
  # Alpine-образ выбран ради минимального размера.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lawer-redis
    restart: unless-stopped
    # --appendonly yes включает AOF-персистентность: задачи BullMQ не теряются
    # при рестарте контейнера. Для dev этого достаточно, в проде можно
    # рассмотреть --appendfsync everysec + RDB-снапшоты.
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      # Единая таймзона для всех сервисов — см. .env.example, секция "Общие".
      TZ: ${TZ}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - lawer-net

  # ---------------------------------------------------------------------------
  # MinIO — S3-совместимое объектное хранилище для загруженных юристами
  # документов (.docx/.pdf/.rtf/.txt, до 50 МБ, см. ТЗ §3.2).
  # Тег RELEASE.2024-10-13T13-34-11Z зафиксирован вместо :latest ради
  # воспроизводимости сборок (latest может ломаться при обновлениях MinIO).
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: lawer-minio
    restart: unless-stopped
    # server /data  — путь хранения объектов внутри контейнера.
    # --console-address — отдельный порт для веб-консоли администрирования
    # (S3 API и консоль в современных MinIO разведены на разные порты).
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Единая таймзона для всех сервисов — см. .env.example, секция "Общие".
      TZ: ${TZ}
    ports:
      # 9000 — S3 API (используется backend'ом через AWS SDK / minio-js)
      - "${MINIO_PORT}:9000"
      # 9001 — веб-консоль (открывать в браузере: http://localhost:9001)
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    # HTTP-проба на встроенный liveness-эндпоинт MinIO.
    # curl идёт в составе образа minio/minio.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lawer-net

  # ---------------------------------------------------------------------------
  # Backend — Fastify 5 + TypeScript + Prisma.
  # Собирается из backend/Dockerfile (multi-stage: deps → build → runtime).
  # Переменные окружения передаются через environment:, а не через --env-file.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lawer-backend
    restart: unless-stopped
    environment:
      # Единая таймзона — см. .env.example.
      TZ: ${TZ}
      NODE_ENV: ${NODE_ENV}
      BACKEND_PORT: ${BACKEND_PORT}
      # Внутри контейнера слушаем на всех интерфейсах, независимо от .env.
      BACKEND_HOST: "0.0.0.0"
      # База данных (Prisma).
      DATABASE_URL: ${DATABASE_URL}
      # Redis (BullMQ очереди + кэш).
      REDIS_URL: ${REDIS_URL}
      # MinIO (S3-совместимое хранилище документов).
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      # JWT / Аутентификация.
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      # LLM (Ollama / OpenAI-совместимый API).
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      # Эмбеддинги (RAG).
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      # Логирование и лимиты.
      LOG_LEVEL: ${LOG_LEVEL}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
    # Порт доступен из локальной сети (0.0.0.0) для dev-тестирования.
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    # Backend стартует только после готовности всех зависимостей.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    # Shell-form позволяет подставить $BACKEND_PORT из окружения контейнера.
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:$${BACKEND_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lawer-net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 14 + TypeScript (standalone-режим).
  # Собирается из frontend/Dockerfile (multi-stage: deps → build → runtime).
  # NEXT_PUBLIC_* переменные передаются через args: (build-time), а не
  # environment: — Next.js вшивает их в JS-bundle при `next build`.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* переменные нужны на этапе сборки (вшиваются в JS-bundle).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    container_name: lawer-frontend
    restart: unless-stopped
    environment:
      # Единая таймзона — см. .env.example.
      TZ: ${TZ}
      # Next.js standalone server: hostname и порт.
      # Без HOSTNAME=0.0.0.0 standalone слушает только на localhost,
      # что несовместимо с Docker networking.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    # Порт 3100 на хосте → 3000 внутри контейнера (3000 занят другим проектом).
    ports:
      - "3100:3000"
    # Frontend зависит от backend, но не от postgres/redis/minio напрямую —
    # это транзитивные зависимости, которые backend ожидает сам.
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lawer-net

  # ---------------------------------------------------------------------------
  # Ollama — self-hosted LLM-сервер с REST API, совместимым с OpenAI SDK.
  # Образ ollama/ollama автоматически использует CPU; для GPU (NVIDIA)
  # нужно раскомментировать блок deploy ниже.
  # Модели хранятся в именованном volume и не скачиваются повторно.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: lawer-ollama
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    # API на localhost — для отладки через curl.
    ports:
      - "11434:11434"
    volumes:
      # Модели сохраняются между перезапусками.
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      # Ollama стартует быстро, но загрузка модели при первом запросе
      # может занять время.
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lawer-net
    # --- GPU (NVIDIA) ---
    # Раскомментировать при переезде на машину с GPU (например, RTX 4090).
    # Требуется установленный nvidia-container-toolkit на хосте:
    #   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # После раскомментирования также рекомендуется увеличить модель в .env:
    #   LLM_MODEL=qwen2.5:14b  (или qwen2.5:32b для 24GB VRAM)
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # ollama-init — одноразовый контейнер, скачивающий LLM-модель при первом
  # запуске. Запускается вручную через профиль init:
  #   docker compose --profile init up ollama-init
  # Повторный запуск идемпотентен: pull существующей модели — быстрый no-op.
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: lawer-ollama-init
    profiles: ["init"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    # Скачиваем модель, указанную в переменной LLM_MODEL.
    entrypoint: >
      /bin/sh -c "
      ollama pull ${LLM_MODEL:-qwen2.5:7b};
      echo 'Модель ${LLM_MODEL:-qwen2.5:7b} готова';
      ollama pull ${EMBEDDING_MODEL:-nomic-embed-text};
      echo 'Модель эмбеддингов ${EMBEDDING_MODEL:-nomic-embed-text} готова';
      "
    restart: "no"
    networks:
      - lawer-net

  # ---------------------------------------------------------------------------
  # minio-init — одноразовый контейнер (mc = MinIO Client), создающий бакет
  # для документов после первого запуска MinIO. Запускается вручную через
  # профиль init и завершает работу после выполнения:
  #   docker compose --profile init up minio-init
  # Повторный запуск идемпотентен: `mb --ignore-existing` не падает, если
  # бакет уже есть.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: lawer-minio-init
    profiles: ["init"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS}
      # Единая таймзона для всех сервисов — см. .env.example, секция "Общие".
      TZ: ${TZ}
    # Регистрируем alias `local`, создаём бакет (если нет) и выставляем
    # приватную политику доступа — объекты отдаются только по подписанным URL.
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET_DOCUMENTS};
      mc anonymous set none local/$${MINIO_BUCKET_DOCUMENTS};
      echo 'MinIO bucket ready: '$${MINIO_BUCKET_DOCUMENTS};
      "
    restart: "no"
    networks:
      - lawer-net

# =============================================================================
# Сети
# =============================================================================
# Явная bridge-сеть. Её имя (lawer-net) используется вместо неявной
# default-сети, чтобы избежать коллизий с другими проектами на той же машине
# и облегчить диагностику (`docker network inspect lawer-net`).
networks:
  lawer-net:
    name: lawer-net
    driver: bridge

# =============================================================================
# Тома
# =============================================================================
# Именованные volumes живут в /var/lib/docker/volumes и не попадают
# в рабочий каталог проекта (в отличие от bind-mount). Это:
#   - корректнее по правам доступа (uid внутри контейнера ≠ uid хоста);
#   - проще бэкапить (`docker run --rm -v postgres-data:/src ...`);
#   - .gitignore уже исключает каталоги postgres-data/ redis-data/ minio-data/,
#     но они остались бы пустыми — реальные данные лежат в docker-тома.
volumes:
  postgres-data:
    name: lawer-postgres-data
  redis-data:
    name: lawer-redis-data
  minio-data:
    name: lawer-minio-data
  ollama-data:
    name: lawer-ollama-data
